<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Any Versions Diff Explorer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:#f3f3f3; color:#1e1e1e;
    font:13px/1.4 Segoe UI, sans-serif;
    display:flex; flex-direction:column;
  }
  header {
    padding:8px 14px; background:#fff; border-bottom:1px solid #ddd;
    display:flex; gap:14px; align-items:center;
  }
  header h1 { font-size:14px; font-weight:600; color:#0066aa; }
  header label { font-size:12px; display:flex; gap:5px; align-items:center; }
  header button {
    padding:4px 12px; font-size:12px; cursor:pointer;
    background:#0066aa; color:#fff; border:none; border-radius:3px;
  }
  header button:hover { background:#0080cc; }
  main {
    flex:1; display:flex; flex-direction:row; padding:6px; gap:0;
    min-height:0;
  }
  .vsplitter {
    flex-shrink:0; width:5px; cursor:col-resize;
    background:#e0e0e0; border-left:1px solid #ccc; border-right:1px solid #ccc;
    margin:0 2px;
  }
  .vsplitter:hover, .vsplitter.dragging { background:#b0c8e0; }
  .pane {
    display:flex; flex-direction:column; min-height:0;
    background:#fff; border:1px solid #ccc; border-radius:3px;
  }
  .pane h2 {
    padding:4px 10px; font-size:12px; font-weight:600;
    background:#fafafa; border-bottom:1px solid #ddd; color:#555;
    display:flex; justify-content:space-between; align-items:center;
  }
  .pane h2 .badge { font-weight:normal; color:#888; font-size:11px; }
  .editors { display:flex; flex-direction:column; flex:1; min-height:0; padding:4px; }
  .editor { display:flex; flex-direction:column; min-height:0; }
  .editor label { font-size:11px; color:#888; padding:2px 4px; flex-shrink:0; }
  .editor textarea {
    flex:1; font:12px/1.5 Consolas, monospace;
    border:1px solid #ddd; padding:6px;
    resize:none; outline:none; min-height:0;
  }
  .editor textarea:focus { border-color:#0080cc; }
  .splitter {
    flex-shrink:0; height:5px; cursor:row-resize;
    background:#e0e0e0; border-top:1px solid #ccc; border-bottom:1px solid #ccc;
    margin:2px 0;
  }
  .splitter:hover, .splitter.dragging { background:#b0c8e0; }
  .diff-frame {
    flex:1; border:none; background:#fff;
    width:100%; height:100%; min-height:0;
  }
</style>
</head>
<body>
<header>
  <h1>Any Versions Diff Explorer</h1>
  <label><input type="checkbox" id="autoCompare" checked> auto-compare</label>
  <label><input type="checkbox" id="twoPane"> 2-pane mode</label>
  <label><input type="checkbox" id="compact"> compact (skip unchanged)</label>
  <button id="btnCompare">Compare</button>
  <button id="btnDebug" title="Show ops + pairing decisions instead of diff">Debug</button>
  <button id="btnSwap" title="Swap old/new">⇅ swap</button>
  <button id="btnClear" title="Clear both textareas and saved state">Clear</button>
  <span id="status" style="margin-left:auto;font-size:11px;color:#888;"></span>
</header>
<main id="main">
  <div class="pane" id="paneSource" style="flex:1">
    <h2>Source <span class="badge">new (top) — old (bottom)</span></h2>
    <div class="editors" id="editors">
      <div class="editor" id="editorNew" style="flex:1">
        <label>NEW version</label>
        <textarea id="newText" spellcheck="false" placeholder="paste new version here"></textarea>
      </div>
      <div class="splitter" id="splitter"></div>
      <div class="editor" id="editorOld" style="flex:1">
        <label>OLD version</label>
        <textarea id="oldText" spellcheck="false" placeholder="paste old version here"></textarea>
      </div>
    </div>
  </div>
  <div class="vsplitter" id="vsplitter"></div>
  <div class="pane" id="paneDiff" style="flex:1;min-width:80px">
    <h2>Diff <span class="badge" id="diffStats"></span></h2>
    <iframe id="diffFrame" class="diff-frame" sandbox="allow-same-origin"></iframe>
  </div>
</main>

<script src="diff.js"></script>
<script>
(function () {
  const $old = document.getElementById('oldText');
  const $new = document.getElementById('newText');
  const $auto = document.getElementById('autoCompare');
  const $twoPane = document.getElementById('twoPane');
  const $compact = document.getElementById('compact');
  const $frame = document.getElementById('diffFrame');
  const $stats = document.getElementById('diffStats');
  const $status = document.getElementById('status');

  function splitLines(s) {
    if (s === '') return [];
    // Match ABAP source: each entry is one line, no trailing newline
    return s.replace(/\r\n/g, '\n').split('\n');
  }

  let debugMode = false;

  function debounce(fn, ms) {
    let h;
    return function () {
      clearTimeout(h);
      h = setTimeout(fn, ms);
    };
  }

  // ─── persist state in localStorage so reload doesn't wipe the textareas ──
  const LS_KEY = 'ave-diff-simulator-v1';
  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      if (typeof s.old === 'string') $old.value = s.old;
      if (typeof s.new === 'string') $new.value = s.new;
      if (typeof s.auto === 'boolean') $auto.checked = s.auto;
      if (typeof s.twoPane === 'boolean') $twoPane.checked = s.twoPane;
      if (typeof s.compact === 'boolean') $compact.checked = s.compact;
    } catch (e) { /* ignore corrupt state */ }
  }
  const saveState = debounce(function () {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        old: $old.value,
        new: $new.value,
        auto: $auto.checked,
        twoPane: $twoPane.checked,
        compact: $compact.checked,
      }));
    } catch (e) { /* quota / private mode — ignore */ }
  }, 250);

  function run() {
    const oldLines = splitLines($old.value);
    const newLines = splitLines($new.value);
    const t0 = performance.now();
    const ops = AVEDiff.computeDiff(oldLines, newLines);
    const html = debugMode
      ? AVEDiff.debugToHtml(ops, {
          title: 'simulator',
          meta: `old=${oldLines.length} new=${newLines.length}`,
        })
      : AVEDiff.diffToHtml(ops, {
          title: 'simulator',
          meta: `old=${oldLines.length} new=${newLines.length}`,
          twoPane: $twoPane.checked,
          compact: $compact.checked,
        });
    const t1 = performance.now();
    const adds = ops.filter(o => o.op === '+').length;
    const dels = ops.filter(o => o.op === '-').length;
    const eq = ops.filter(o => o.op === '=').length;
    $stats.textContent = `+${adds} -${dels} =${eq}${debugMode ? ' (debug)' : ''}`;
    $status.textContent = `rendered in ${(t1 - t0).toFixed(1)} ms`;
    $frame.srcdoc = html;
  }

  const debouncedRun = debounce(run, 150);

  function onInput() { saveState(); if ($auto.checked) debouncedRun(); }
  function onToggle() { saveState(); run(); }
  $old.addEventListener('input', onInput);
  $new.addEventListener('input', onInput);
  $auto.addEventListener('change', saveState);
  $twoPane.addEventListener('change', onToggle);
  $compact.addEventListener('change', onToggle);
  document.getElementById('btnCompare').addEventListener('click', () => { debugMode = false; run(); });
  document.getElementById('btnDebug').addEventListener('click', () => { debugMode = !debugMode; run(); });
  document.getElementById('btnSwap').addEventListener('click', () => {
    const t = $old.value; $old.value = $new.value; $new.value = t;
    saveState(); run();
  });
  document.getElementById('btnClear').addEventListener('click', () => {
    $old.value = '';
    $new.value = '';
    try { localStorage.removeItem(LS_KEY); } catch (e) { /* ignore */ }
    run();
  });

  loadState();
  run();

  // ─── draggable vertical splitter between source and diff panes ──────────
  (function () {
    const vs      = document.getElementById('vsplitter');
    const pSrc    = document.getElementById('paneSource');
    const frame   = document.getElementById('diffFrame');
    let startX, startSrcW;

    vs.addEventListener('mousedown', function (e) {
      e.preventDefault();
      startX    = e.clientX;
      startSrcW = pSrc.getBoundingClientRect().width;
      vs.classList.add('dragging');
      frame.style.pointerEvents = 'none';   // prevent iframe swallowing events

      function onMove(e) {
        const dx = e.clientX - startX;
        pSrc.style.flex  = 'none';
        pSrc.style.width = Math.max(80, startSrcW + dx) + 'px';
      }
      function onUp() {
        vs.classList.remove('dragging');
        frame.style.pointerEvents = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  })();

  // ─── draggable splitter between the two textareas ───────────────────────
  (function () {
    const splitter  = document.getElementById('splitter');
    const editorNew = document.getElementById('editorNew');
    const editorOld = document.getElementById('editorOld');
    const editors   = document.getElementById('editors');
    let startY, startNewH, startOldH;

    splitter.addEventListener('mousedown', function (e) {
      e.preventDefault();
      startY    = e.clientY;
      startNewH = editorNew.getBoundingClientRect().height;
      startOldH = editorOld.getBoundingClientRect().height;
      splitter.classList.add('dragging');

      function onMove(e) {
        const dy   = e.clientY - startY;
        const newH = Math.max(40, startNewH + dy);
        const oldH = Math.max(40, startOldH - dy);
        editorNew.style.flex = 'none';
        editorNew.style.height = newH + 'px';
        editorOld.style.flex = 'none';
        editorOld.style.height = oldH + 'px';
      }
      function onUp() {
        splitter.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  })();
})();
</script>
</body>
</html>
